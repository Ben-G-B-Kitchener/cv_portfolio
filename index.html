<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home</title>

<link rel="stylesheet" href="assets/style.css"/>

<style>

/* ================================
   OSCILLOSCOPE LAYOUT (CLEAN)
================================ */

.scope-wrapper{
  display:flex;
  gap:2rem;
  align-items:flex-start;
  flex-wrap:wrap;
}

/* SCREEN PANEL */
.scope-screen-panel{
  position:relative;
  flex: 1 1 700px;
  max-width: 900px;

  background:#000;
  border:1px solid rgba(51,255,102,0.25);
  border-radius:6px;
  box-shadow: 0 0 20px rgba(51,255,102,0.12);
}

/* CANVAS */
#scope{
  width:100%;
  height:420px;
  display:block;
}

/* CONTROL COLUMN */
.scope-controls{
  flex: 0 0 260px;

  display:flex;
  flex-direction:column;
  gap:1.5rem;

  padding:1rem;
  border:1px solid rgba(51,255,102,0.15);
  border-radius:6px;
  background:rgba(8,20,8,0.4);
}

/* LABELS */
.control-group{
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}

.control-group label{
  font-size:0.8rem;
  color:#4fbf63;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

/* SLIDERS (GREEN TERMINAL STYLE) */
input[type="range"]{
  -webkit-appearance:none;
  appearance:none;

  width:100%;
  height:4px;

  background:rgba(51,255,102,0.25);
  border-radius:2px;
  outline:none;
}

/* track fill */
input[type="range"]::-webkit-slider-runnable-track{
  height:4px;
  background:rgba(51,255,102,0.25);
}

/* thumb */
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;

  width:16px;
  height:16px;
  border-radius:50%;

  background:#33ff66;
  border:1px solid #081408;

  box-shadow:0 0 8px rgba(51,255,102,0.5);

  cursor:pointer;
  margin-top:-6px;
}

input[type="range"]::-moz-range-thumb{
  width:16px;
  height:16px;
  border-radius:50%;
  background:#33ff66;
  border:1px solid #081408;
  cursor:pointer;
}

/* value text */
.value{
  font-size:0.75rem;
  color:#7dff8a;
}

/* MOBILE STACK */
@media (max-width: 900px){
  .scope-wrapper{
    flex-direction:column;
  }

  .scope-controls{
    width:100%;
  }
}

</style>

</head>

<body>

<header class="header">
  <div class="section header-inner">

    <div>
      <h1>Ben Kitchener</h1>
      <p class="muted">Engineering Portfolio</p>
    </div>

    <nav class="nav">
      <a href="index.html"><b>Home</b></a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="experience.html">Experience</a>
      <a href="education.html">Education</a>
      <a href="publications.html">Publications</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>


<section class="section">

  <div class="scope-wrapper">

    <!-- SCREEN -->
    <div class="scope-screen-panel">
      <canvas id="scope"></canvas>
    </div>

    <!-- CONTROLS -->
    <div class="scope-controls">

      <div class="control-group">
        <label>Frequency (Hz)</label>
        <input id="freq" type="range" min="1" max="50" value="10">
        <div class="value" id="freqVal">10 Hz</div>
      </div>

      <div class="control-group">
        <label>Amplitude (V/div)</label>
        <input id="amp" type="range" min="1" max="10" value="4">
        <div class="value" id="ampVal">4 V/div</div>
      </div>

      <div class="control-group">
        <label>Timebase (ms/div)</label>
        <input id="time" type="range" min="1" max="20" value="8">
        <div class="value" id="timeVal">8 ms/div</div>
      </div>

    </div>

  </div>

</section>


<footer class="footer">
  © 2026 Ben G. B. Kitchener
</footer>


<script>

const canvas = document.getElementById("scope");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", resize);
resize();

const freq = document.getElementById("freq");
const amp = document.getElementById("amp");
const time = document.getElementById("time");

const freqVal = document.getElementById("freqVal");
const ampVal = document.getElementById("ampVal");
const timeVal = document.getElementById("timeVal");

let phase = 0;

function grid(){
  ctx.strokeStyle = "rgba(51,255,102,0.08)";
  ctx.lineWidth = 1;

  const step = 40;

  for(let x=0;x<canvas.width;x+=step){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<canvas.height;y+=step){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }
}

function draw(){

  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  grid();

  const f = Number(freq.value);
  const a = Number(amp.value) * 20;
  const t = Number(time.value);

  ctx.beginPath();

  for(let x=0;x<canvas.width;x++){

    const y =
      canvas.height/2 +
      Math.sin((x * 0.003 * f * t) + phase) * a;

    x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }

  ctx.strokeStyle = "#33ff66";
  ctx.shadowColor = "#33ff66";
  ctx.shadowBlur = 8;
  ctx.lineWidth = 2;
  ctx.stroke();

  phase += 0.04;

  requestAnimationFrame(draw);
}

draw();

/* live labels */
function updateLabels(){
  freqVal.textContent = `${freq.value} Hz`;
  ampVal.textContent = `${amp.value} V/div`;
  timeVal.textContent = `${time.value} ms/div`;
}

[freq,amp,time].forEach(el=>{
  el.addEventListener("input", updateLabels);
});

updateLabels();

</script>

</body>
</html>
