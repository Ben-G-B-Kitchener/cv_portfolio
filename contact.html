<section class="section scope-card">

    <div class="scope-wrapper">

      <!-- SCREEN -->

      </div>

      <!-- CONTROLS -->
      <div class="scope-controls">

        <!-- X SIGNAL -->

          <label>X Frequency (Hz)</label>
          <input id="xFreq" type="range" min="1" max="20" value="2">

          <input id="xAmp" type="range" min="1" max="10" value="1">
          <div class="value-row">
            <span></span>
            <span class="value" id="xAmpVal"></span>
          </div>
        </div>

        <!-- Y SIGNAL -->
        <div class="control-group">
          <label>Y Frequency (Hz)</label>
          <input id="yFreq" type="range" min="1" max="20" value="4">
          <div class="value-row">

        </div>

          <label>Y Amplitude</label>
          <input id="yAmp" type="range" min="1" max="10" value="1">
          <div class="value-row">
            <span></span>
            <span class="value" id="yAmpVal"></span>
          </div>
        </div>

        <!-- PHASE -->
        <div class="control-group">
          <label>Phase Offset</label>
          <input id="phase" type="range" min="0" max="360" value="90">
          <div class="value-row">

<script>

const canvas = document.getElementById("xyScope");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", resize);
resize();

const xFreq = document.getElementById("xFreq");
const yFreq = document.getElementById("yFreq");

const xAmp = document.getElementById("xAmp");
const yAmp = document.getElementById("yAmp");

const phaseSlider = document.getElementById("phase");

const xFreqVal = document.getElementById("xFreqVal");
const yFreqVal = document.getElementById("yFreqVal");

const xAmpVal = document.getElementById("xAmpVal");
const yAmpVal = document.getElementById("yAmpVal");

const phaseVal = document.getElementById("phaseVal");

let t = 0;

function drawGrid(){

  ctx.strokeStyle = "rgba(51,255,102,0.08)";
  ctx.lineWidth = 1;

  const step = 40;

  for(let x=0;x<canvas.width;x+=step){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<canvas.height;y+=step){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }
}

function draw(){

  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawGrid();

  const xf = Number(xFreq.value);
  const yf = Number(yFreq.value);

  const xa = Number(xAmp.value) * 6;
  const ya = Number(yAmp.value) * 6;

  const phase =
    Number(phaseSlider.value) * Math.PI / 180;

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.beginPath();

  for(let i=0;i<2000;i++){

    const tt = i * 0.01;

    const x =
      cx +
      Math.sin(tt * xf + t) * xa * 10;

    const y =
      cy +
      Math.sin(tt * yf + t + phase) * ya * 10;

    if(i===0){
      ctx.moveTo(x,y);
    } else {
      ctx.lineTo(x,y);
    }
  }

  ctx.strokeStyle = "#33ff66";
  ctx.shadowColor = "#33ff66";
  ctx.shadowBlur = 8;
  ctx.lineWidth = 2;
  ctx.stroke();

  t += 0.01;

  requestAnimationFrame(draw);
}

draw();

function updateLabels(){

  xFreqVal.textContent = `${xFreq.value} Hz`;
  yFreqVal.textContent = `${yFreq.value} Hz`;

  xAmpVal.textContent = `${xAmp.value} V`;
  yAmpVal.textContent = `${yAmp.value} V`;

  phaseVal.textContent = `${phaseSlider.value}°`;
}

[
  xFreq,
  yFreq,
  xAmp,
  yAmp,
  phaseSlider
].forEach(el =>
  el.addEventListener("input", updateLabels)
);

updateLabels();

</script>
